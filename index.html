<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fremis.ai — Intelligence to ∞</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #080c14;
      color: #e8eaf0;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(30, 80, 160, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 50%, rgba(80, 30, 160, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 0.4rem;
    }

    .logo span {
      color: #4a9eff;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 300;
      color: #8892a4;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
    }

    .infinity {
      color: #4a9eff;
      font-size: 1.2em;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(74, 158, 255, 0.3);
      margin: 0 auto 3rem;
    }

    .coming-soon {
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #4a9eff;
      opacity: 0.7;
    }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 2.5rem;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #4a9eff;
      opacity: 0.3;
      animation: pulse 2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="logo">fremis<span>.ai</span></div>
    <div class="tagline">Intelligence to <span class="infinity">∞</span></div>
    <div class="divider"></div>
    <div class="coming-soon">Coming soon</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
